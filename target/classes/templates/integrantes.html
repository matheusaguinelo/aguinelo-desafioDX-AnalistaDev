<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Integrantes – Duxus Challenge</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/">⚡ Duxus Challenge</a>
        <div class="navbar-nav ms-auto">
            <a class="nav-link active" href="/integrantes">Integrantes</a>
            <a class="nav-link" href="/times">Times</a>
            <a class="nav-link" href="/consultas">Consultas</a>
        </div>
    </div>
</nav>

<div class="container my-4">
    <h2 class="mb-4">Gerenciar Integrantes</h2>

    <!-- Alerta de feedback -->
    <div id="alerta" class="alert d-none" role="alert"></div>

    <!-- Formulário de cadastro -->
    <div class="card mb-4">
        <div class="card-header bg-primary text-white">Adicionar Integrante</div>
        <div class="card-body">
            <form id="formIntegrante" class="row g-3">
                <div class="col-md-6">
                    <label class="form-label">Nome</label>
                    <input type="text" id="nome" class="form-control" placeholder="Ex: Rogério Ceni, Kaká, Hernanes" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Função</label>
                    <input type="text" id="funcao" class="form-control" placeholder="Ex: Atacante, Meia, Volante, Goleiro" required>
                </div>
                <div class="col-12">
                    <button type="submit" class="btn btn-primary">Salvar Integrante</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Tabela de integrantes -->
    <div class="card">
        <div class="card-header">Integrantes Cadastrados</div>
        <div class="card-body p-0">
            <table class="table table-hover mb-0" id="tabelaIntegrantes">
                <thead class="table-dark">
                    <tr>
                        <th>#</th>
                        <th>Nome</th>
                        <th>Função</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="i : ${integrantes}">
                        <td th:text="${i.id}"></td>
                        <td th:text="${i.nome}"></td>
                        <td th:text="${i.funcao}"></td>
                        <td>
                            <button class="btn btn-sm btn-danger"
                                    th:onclick="'deletarIntegrante(' + ${i.id} + ')'">
                                Remover
                            </button>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(integrantes)}">
                        <td colspan="5" class="text-center text-muted py-3">Nenhum integrante cadastrado.</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script>
    // Cadastrar integrante via API REST
    document.getElementById('formIntegrante').addEventListener('submit', async function(e) {
        e.preventDefault();
        const body = {
            nome: document.getElementById('nome').value,
            funcao: document.getElementById('funcao').value
        };
        const resp = await fetch('/api/integrantes', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(body)
        });
        if (resp.ok) {
            mostrarAlerta('Integrante cadastrado com sucesso!', 'success');
            setTimeout(() => location.reload(), 800);
        } else {
            mostrarAlerta('Erro ao cadastrar integrante.', 'danger');
        }
    });

    // Remover integrante
    async function deletarIntegrante(id) {
        if (!confirm('Confirma a remoção deste integrante?')) return;
        const resp = await fetch('/api/integrantes/' + id, {method: 'DELETE'});
        if (resp.ok || resp.status === 204) {
            mostrarAlerta('Integrante removido.', 'warning');
            setTimeout(() => location.reload(), 800);
        } else {
            mostrarAlerta('Erro ao remover integrante.', 'danger');
        }
    }

    function mostrarAlerta(msg, tipo) {
        const el = document.getElementById('alerta');
        el.textContent = msg;
        el.className = 'alert alert-' + tipo;
    }
</script>
</body>
</html>
