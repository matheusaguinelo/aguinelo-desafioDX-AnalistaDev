<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Times – Duxus Challenge</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/">⚡ Duxus Challenge</a>
        <div class="navbar-nav ms-auto">
            <a class="nav-link" href="/integrantes">Integrantes</a>
            <a class="nav-link active" href="/times">Times</a>
            <a class="nav-link" href="/consultas">Consultas</a>
        </div>
    </div>
</nav>

<div class="container my-4">
    <h2 class="mb-4">Montar Times</h2>

    <div id="alerta" class="alert d-none" role="alert"></div>

    <div class="card mb-4">
        <div class="card-header bg-success text-white">Criar Novo Time</div>
        <div class="card-body">
            <form id="formTime" class="row g-3">
                <div class="col-md-5">
                    <label class="form-label">Nome do Clube</label>
                    <input type="text" id="nomeClube" class="form-control" placeholder="Ex: Corinthians, Palmeiras, Santos, São Paulo" required>
                </div>
                <div class="col-md-3">
                    <label class="form-label">Data</label>
                    <input type="date" id="data" class="form-control" required>
                </div>
                <div class="col-12">
                    <label class="form-label">Selecione os Integrantes</label>
                    <div class="row g-2" id="checkboxIntegrantes">
                        <div th:each="i : ${integrantes}" class="col-md-3">
                            <div class="form-check border rounded p-2">
                                <input class="form-check-input integrante-check"
                                       type="checkbox"
                                       th:value="${i.id}"
                                       th:id="'int_' + ${i.id}">
                                <label class="form-check-label" th:for="'int_' + ${i.id}">
                                    <strong th:text="${i.nome}"></strong>
                                    <br>
                                    <small class="text-muted" th:text="${i.funcao}"></small>
                                </label>
                            </div>
                        </div>
                        <p th:if="${#lists.isEmpty(integrantes)}" class="text-muted">
                            Nenhum integrante cadastrado. <a href="/integrantes">Cadastre integrantes primeiro.</a>
                        </p>
                    </div>
                </div>
                <div class="col-12">
                    <button type="submit" class="btn btn-success">Montar Time</button>
                </div>
            </form>
        </div>
    </div>

    <div class="card">
        <div class="card-header">Times Cadastrados</div>
        <div class="card-body p-0">
            <table class="table table-hover mb-0">
                <thead class="table-dark">
                    <tr>
                        <th>#</th>
                        <th>Clube</th>
                        <th>Data</th>
                        <th>Integrantes</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="t : ${times}">
                        <td th:text="${t.id}"></td>
                        <td th:text="${t.nomeClube}"></td>
                        <td th:text="${#temporals.format(t.data, 'dd/MM/yyyy')}"></td>
                        <td>
                            <span th:each="ct, iterStat : ${t.composicaoTimes}">
                                <span th:text="${ct.integrante.nome}"></span><span th:if="!${iterStat.last}">, </span>
                            </span>
                        </td>
                        <td>
                            <button class="btn btn-sm btn-danger"
                                    th:onclick="'deletarTime(' + ${t.id} + ')'">
                                Remover
                            </button>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(times)}">
                        <td colspan="5" class="text-center text-muted py-3">Nenhum time montado.</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script>
    document.getElementById('formTime').addEventListener('submit', async function(e) {
        e.preventDefault();
        const ids = [...document.querySelectorAll('.integrante-check:checked')].map(cb => parseInt(cb.value));
        if (ids.length === 0) {
            mostrarAlerta('Selecione ao menos um integrante.', 'warning');
            return;
        }
        const body = {
            nomeClube: document.getElementById('nomeClube').value,
            data: document.getElementById('data').value,
            integranteIds: ids
        };
        const resp = await fetch('/api/times', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(body)
        });
        if (resp.ok) {
            mostrarAlerta('Time criado com sucesso!', 'success');
            setTimeout(() => location.reload(), 800);
        } else {
            const msg = await resp.text();
            mostrarAlerta('Erro: ' + msg, 'danger');
        }
    });

    async function deletarTime(id) {
        if (!confirm('Confirma a remoção deste time?')) return;
        const resp = await fetch('/api/times/' + id, {method: 'DELETE'});
        if (resp.ok || resp.status === 204) {
            mostrarAlerta('Time removido.', 'warning');
            setTimeout(() => location.reload(), 800);
        } else {
            mostrarAlerta('Erro ao remover time.', 'danger');
        }
    }

    function mostrarAlerta(msg, tipo) {
        const el = document.getElementById('alerta');
        el.textContent = msg;
        el.className = 'alert alert-' + tipo;
    }
</script>
</body>
</html>
