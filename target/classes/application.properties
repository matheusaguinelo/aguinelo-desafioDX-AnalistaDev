# =============================================================
# Configuracoes comuns a todos os profiles
# =============================================================
server.port=8080
spring.application.name=duxusdesafio

# Thymeleaf - desativa cache para facilitar desenvolvimento
spring.thymeleaf.cache=false

# Profile ativo padrao - sobreposto por variavel de ambiente SPRING_PROFILES_ACTIVE
spring.profiles.active=dev

# SpringDoc / Swagger UI - acessivel em /swagger-ui.html
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
