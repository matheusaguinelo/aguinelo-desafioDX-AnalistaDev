# =============================================================
# Banco de dados H2 em memï¿½iria (para facilitar a execuï¿½ï¿½o do teste, sem necessidade de instalaï¿½ï¿½o)
# =============================================================
spring.datasource.url=jdbc:h2:mem:duxusdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Console H2 acessï¿½vel em http://localhost:8080/h2-console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Porta da aplicaï¿½ï¿½o
server.port=8080

# Thymeleaf â€“ desativa cache para facilitar desenvolvimento
spring.thymeleaf.cache=false
