# =============================================================
# Banco de dados H2 em memïŋ―iria (para facilitar a execuïŋ―ïŋ―o do teste, sem necessidade de instalaïŋ―ïŋ―o)
# =============================================================
spring.datasource.url=jdbc:h2:mem:duxusdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Console H2 acessïŋ―vel em http://localhost:8080/h2-console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Porta da aplicaïŋ―ïŋ―o
server.port=8080

# Thymeleaf ? desativa cache para facilitar desenvolvimento
spring.thymeleaf.cache=false