<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Integrantes – Duxus Challenge</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/">⚡ Duxus Challenge</a>
        <div class="navbar-nav ms-auto">
            <a class="nav-link active" href="/integrantes">Integrantes</a>
            <a class="nav-link" href="/times">Times</a>
            <a class="nav-link" href="/consultas">Consultas</a>
        </div>
    </div>
</nav>

<div class="container my-4">
    <h2 class="mb-4">Gerenciar Integrantes</h2>

    <div id="alerta" class="alert d-none" role="alert"></div>

    <div class="card mb-4">
        <div class="card-header bg-primary text-white">Adicionar Integrante</div>
        <div class="card-body">
            <form id="formIntegrante" class="row g-3">
                <div class="col-md-6">
                    <label class="form-label">Nome</label>
                    <input type="text" id="nome" class="form-control" placeholder="Ex: Rogério Ceni, Kaká, Hernanes" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Função</label>
                    <input type="text" id="funcao" class="form-control" placeholder="Ex: Atacante, Meia, Volante, Goleiro" required>
                </div>
                <div class="col-12">
                    <button type="submit" class="btn btn-primary">Salvar Integrante</button>
                </div>
            </form>
        </div>
    </div>

    <div class="card">
        <div class="card-header">Integrantes Cadastrados</div>
        <div class="card-body p-0">
            <table class="table table-hover mb-0" id="tabelaIntegrantes">
                <thead class="table-dark">
                    <tr>
                        <th>#</th>
                        <th>Nome</th>
                        <th>Função</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="i : ${integrantes}">
                        <td th:text="${i.id}"></td>
                        <td th:text="${i.nome}"></td>
                        <td th:text="${i.funcao}"></td>
                        <td>
                            <button class="btn btn-sm btn-warning me-1"
                                    th:data-id="${i.id}"
                                    th:data-nome="${i.nome}"
                                    th:data-funcao="${i.funcao}"
                                    onclick="abrirEdicao(this)">
                                Editar
                            </button>
                            <button class="btn btn-sm btn-danger"
                                    th:onclick="'deletarIntegrante(' + ${i.id} + ')'">
                                Remover
                            </button>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(integrantes)}">
                        <td colspan="4" class="text-center text-muted py-3">Nenhum integrante cadastrado.</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<!-- Modal de Edição -->
<div class="modal fade" id="modalEdicao" tabindex="-1" aria-labelledby="modalEdicaoLabel" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header bg-warning">
                <h5 class="modal-title" id="modalEdicaoLabel">Editar Integrante</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="editId">
                <div class="mb-3">
                    <label class="form-label">Nome</label>
                    <input type="text" id="editNome" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Função</label>
                    <input type="text" id="editFuncao" class="form-control" required>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                <button type="button" class="btn btn-warning" onclick="salvarEdicao()">Salvar alterações</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    // Cadastrar integrante via API REST
    document.getElementById('formIntegrante').addEventListener('submit', async function(e) {
        e.preventDefault();
        const body = {
            nome: document.getElementById('nome').value,
            funcao: document.getElementById('funcao').value
        };
        const resp = await fetch('/api/integrantes', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(body)
        });
        if (resp.ok) {
            mostrarAlerta('Integrante cadastrado com sucesso!', 'success');
            setTimeout(() => location.reload(), 800);
        } else {
            const json = await resp.json().catch(() => ({mensagem: 'Erro ao cadastrar.'}));
            mostrarAlerta('Erro: ' + json.mensagem, 'danger');
        }
    });

    // Abre o modal de edição preenchido com os dados atuais
    function abrirEdicao(btn) {
        document.getElementById('editId').value = btn.dataset.id;
        document.getElementById('editNome').value = btn.dataset.nome;
        document.getElementById('editFuncao').value = btn.dataset.funcao;
        new bootstrap.Modal(document.getElementById('modalEdicao')).show();
    }

    // Salva a edição via PUT
    async function salvarEdicao() {
        const id = document.getElementById('editId').value;
        const body = {
            nome: document.getElementById('editNome').value,
            funcao: document.getElementById('editFuncao').value
        };
        const resp = await fetch('/api/integrantes/' + id, {
            method: 'PUT',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(body)
        });
        if (resp.ok) {
            bootstrap.Modal.getInstance(document.getElementById('modalEdicao')).hide();
            mostrarAlerta('Integrante atualizado com sucesso!', 'success');
            setTimeout(() => location.reload(), 800);
        } else {
            const json = await resp.json().catch(() => ({mensagem: 'Erro ao atualizar.'}));
            mostrarAlerta('Erro: ' + json.mensagem, 'danger');
        }
    }

    // Remover integrante
    async function deletarIntegrante(id) {
        if (!confirm('Confirma a remoção deste integrante?')) return;
        const resp = await fetch('/api/integrantes/' + id, {method: 'DELETE'});
        if (resp.status === 204) {
            mostrarAlerta('Integrante removido.', 'warning');
            setTimeout(() => location.reload(), 800);
        } else {
            const json = await resp.json().catch(() => ({mensagem: 'Erro ao remover.'}));
            mostrarAlerta('Erro: ' + json.mensagem, 'danger');
        }
    }

    function mostrarAlerta(msg, tipo) {
        const el = document.getElementById('alerta');
        el.textContent = msg;
        el.className = 'alert alert-' + tipo;
    }
</script>
</body>
</html>
