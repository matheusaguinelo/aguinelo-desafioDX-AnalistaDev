# =============================================================
# Profile: PROD  PostgreSQL, logs reduzidos, console desabilitado
# Ativar com: SPRING_PROFILES_ACTIVE=prod
# Preencher variaveis de ambiente antes de usar em producao.
# =============================================================
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/duxusdb}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASS:}

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

# Console H2 desabilitado em producao
spring.h2.console.enabled=false

# Logging mais restrito
logging.level.root=WARN
logging.level.br.com.duxusdesafio=INFO
